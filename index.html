<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verkeersinformatie Nederland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    width: 100vw;
    height: 100vh;
    background:
      linear-gradient(180deg, rgba(10,14,23,0.82) 0%, rgba(10,14,23,0.92) 60%, rgba(10,14,23,0.97) 100%),
      radial-gradient(ellipse at 70% 30%, rgba(231,76,60,0.15), transparent 55%),
      url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?auto=format&fit=crop&w=1920&q=80')
        center / cover no-repeat,
      #0a0e17;
  }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
    color: #ffffff;
    font-family: 'Outfit', 'DM Sans', system-ui, sans-serif;
    font-weight: 400;
  }
  .card {
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .app {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 36px 48px 40px;
  }

  /* ======= HEADER ======= */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 22px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 26px;
  }
  .header-left h1 {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .header-left .subtitle {
    margin-top: 10px;
    font-size: 16px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
  }
  .header-left .status-timer {
    margin-top: 6px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
  }
  .header-left .status-timer .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2ecc71;
    box-shadow: 0 0 8px rgba(46,204,113,0.7);
  }
  .header-left .status-timer.has-files .pulse {
    background: #e74c3c;
    box-shadow: 0 0 8px rgba(231,76,60,0.7);
    animation: timerPulse 1.6s ease-in-out infinite;
  }
  @keyframes timerPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(0.85); }
  }
  .header-right {
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .stat {
    text-align: right;
  }
  .stat .value {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: #ffffff;
  }
  .stat .label {
    margin-top: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 500;
  }
  .stat.red .value { color: #e74c3c; }
  .stat.orange .value { color: #f39c12; }

  /* ======= GAUGE ======= */
  .gauge {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-left: 12px;
    padding-left: 28px;
    border-left: 1px solid rgba(255,255,255,0.08);
  }
  .gauge-svg {
    width: 210px;
    height: 120px;
    display: block;
    overflow: visible;
  }
  .gauge-needle {
    /* geen animatie: naald springt direct naar de juiste positie */
  }
  .gauge-level {
    margin-top: 2px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2px;
    text-align: center;
    line-height: 1;
  }
  .gauge-sub {
    margin-top: 5px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.4px;
    font-weight: 500;
  }
  .gauge-level.level-0 { color: #2ecc71; }
  .gauge-level.level-1 { color: #9ed95f; }
  .gauge-level.level-2 { color: #f1c40f; }
  .gauge-level.level-3 { color: #e67e22; }
  .gauge-level.level-4 { color: #e74c3c; }

  /* ======= COLUMNS ======= */
  .columns {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    min-height: 0;
  }
  .column {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .column-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .column-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .column-title .dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 12px;
    vertical-align: middle;
    transform: translateY(-2px);
  }
  .column.files .dot { background: #e74c3c; box-shadow: 0 0 12px rgba(231,76,60,0.6); }
  .column.works .dot { background: #f39c12; box-shadow: 0 0 12px rgba(243,156,18,0.6); }
  .column-count {
    font-size: 16px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }

  .list {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ======= CARD ======= */
  .card {
    position: relative;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 18px 14px 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
  }
  .card.file::before { background: #e74c3c; }
  .card.work::before { background: #f39c12; }

  .badge {
    flex-shrink: 0;
    min-width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #151b26;
    border: 2px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: #f1c40f;
    letter-spacing: -0.5px;
    padding: 0 6px;
  }
  .card.work .badge { color: #ffffff; }

  .body {
    flex: 1;
    min-width: 0;
  }
  .route {
    font-size: 20px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .route .arrow {
    color: rgba(255,255,255,0.35);
    margin: 0 8px;
    font-weight: 400;
  }
  .meta {
    margin-top: 6px;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  .meta .reason {
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }
  .meta .sep {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }

  .right-stat {
    flex-shrink: 0;
    text-align: right;
    min-width: 90px;
  }
  .right-stat .big {
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
    color: #e74c3c;
  }
  .right-stat .unit {
    margin-top: 2px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 500;
  }
  .card.work .right-stat .big {
    font-size: 18px;
    color: #f39c12;
    font-weight: 600;
  }
  .card.work .right-stat .unit { text-transform: none; letter-spacing: 0; }

  /* ======= EMPTY ======= */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.55);
    gap: 20px;
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
    padding: 40px;
  }
  .empty .check {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(46,204,113,0.15);
    border: 2px solid #2ecc71;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .empty .check svg {
    width: 38px;
    height: 38px;
    stroke: #2ecc71;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .empty .text {
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
  }

  .loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
  }

  /* Timestamp */
  .update-time {
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>Verkeersinformatie Nederland</h1>
      <div class="subtitle">Laatst bijgewerkt: <span class="update-time" id="updateTime">—</span></div>
      <div class="status-timer" id="statusTimer" style="visibility:hidden">
        <span class="pulse"></span><span id="statusTimerText">—</span>
      </div>
    </div>
    <div class="header-right">
      <div class="stat red">
        <div class="value" id="statFiles">—</div>
        <div class="label">Files</div>
      </div>
      <div class="stat">
        <div class="value" id="statKm">—</div>
        <div class="label">Km totaal</div>
      </div>
      <div class="stat orange">
        <div class="value" id="statWorks">—</div>
        <div class="label">Werkzaamheden</div>
      </div>
      <div class="gauge">
        <!-- Geometry: center (105, 105), radius 85. Arc sweeps 180° from (20,105) to (190,105). -->
        <svg class="gauge-svg" viewBox="0 0 210 120" aria-hidden="true">
          <defs>
            <linearGradient id="gaugeGrad" x1="0%" y1="100%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#2ecc71"/>
              <stop offset="35%"  stop-color="#9ed95f"/>
              <stop offset="55%"  stop-color="#f1c40f"/>
              <stop offset="78%"  stop-color="#e67e22"/>
              <stop offset="100%" stop-color="#e74c3c"/>
            </linearGradient>
            <filter id="needleShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
              <feOffset dx="0" dy="1" result="offsetblur"/>
              <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
              <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- track -->
          <path d="M 20 105 A 85 85 0 0 1 190 105"
                fill="none" stroke="rgba(255,255,255,0.07)"
                stroke-width="16" stroke-linecap="round"/>
          <!-- colored arc -->
          <path d="M 20 105 A 85 85 0 0 1 190 105"
                fill="none" stroke="url(#gaugeGrad)"
                stroke-width="12" stroke-linecap="round"/>

          <!-- needle: starts at center (105,105), tip at (105, 27). Initial orientation straight up = 50%.
               We rotate relative to that straight-up pose, so angle 0 = midden, -90 = links (0%), +90 = rechts (100%). -->
          <g class="gauge-needle" id="gaugeNeedle" transform="rotate(0 105 105)" filter="url(#needleShadow)">
            <path d="M 101.5 105 L 105 27 L 108.5 105 Z" fill="#ffffff"/>
          </g>

          <!-- hub on top of needle pivot -->
          <circle cx="105" cy="105" r="10" fill="#0a0e17" stroke="#ffffff" stroke-width="2.5"/>
          <circle cx="105" cy="105" r="3"  fill="#ffffff"/>
        </svg>
        <div class="gauge-level" id="gaugeLevel">—</div>
        <div class="gauge-sub">Drukte</div>
      </div>
    </div>
  </div>

  <div class="columns">
    <div class="column files">
      <div class="column-header">
        <div class="column-title"><span class="dot"></span>Files</div>
        <div class="column-count" id="filesCount"></div>
      </div>
      <div class="list" id="filesList">
        <div class="loading">Gegevens ophalen…</div>
      </div>
    </div>

    <div class="column works">
      <div class="column-header">
        <div class="column-title"><span class="dot"></span>Wegwerkzaamheden</div>
        <div class="column-count" id="worksCount"></div>
      </div>
      <div class="list" id="worksList">
        <div class="loading">Gegevens ophalen…</div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // Rijkswaterstaat officiële verkeersinformatie API.
  // CORS staat alleen rwsverkeersinfo.nl toe, dus via CORS-proxy met fallback.
  const TARGET_BASE = 'https://api.rwsverkeersinfo.nl/api/traffic/';
  // Cache-busting: unieke URL per ophaal-cyclus voorkomt dat proxies stale data teruggeven.
  function freshTarget() {
    // Rond af op 30s zodat we niet onnodig vaak raken, maar wel altijd binnen refresh-cyclus verversen.
    const bucket = Math.floor(Date.now() / 30000);
    return TARGET_BASE + '?_=' + bucket;
  }
  // Codetabs/corsproxy cachen niet of licht; allorigins cachet zwaar (stale-while-revalidate 24u) dus als laatste.
  const PROXIES = [
    u => 'https://api.codetabs.com/v1/proxy/?quest=' + u,
    u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u)
  ];
  const FETCH_TIMEOUT_MS = 8000;
  const MAX_ITEMS = 10;
  const REFRESH_MS = 2 * 60 * 1000;

  // obstructionType codes uit RWS API: 1 = wegwerkzaamheden, 4 = file, 7 = rijbaan/afrit afgesloten
  const TYPE_ROADWORK = 1;
  const TYPE_JAM = 4;

  const elFilesList = document.getElementById('filesList');
  const elWorksList = document.getElementById('worksList');
  const elFilesCount = document.getElementById('filesCount');
  const elWorksCount = document.getElementById('worksCount');
  const elStatFiles = document.getElementById('statFiles');
  const elStatKm = document.getElementById('statKm');
  const elStatWorks = document.getElementById('statWorks');
  const elUpdate = document.getElementById('updateTime');
  const elNeedle = document.getElementById('gaugeNeedle');
  const elLevel = document.getElementById('gaugeLevel');
  const elTimer = document.getElementById('statusTimer');
  const elTimerText = document.getElementById('statusTimerText');

  // Bijhouden hoe lang de huidige toestand (wel/geen files) al duurt.
  // Reset bij elke transitie. Begint te tellen vanaf paginalading.
  let stateStart = null;       // ms-tijdstip waarop de huidige toestand begon
  let stateHasFiles = null;    // null = nog onbekend, true/false = huidige status

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function fmtTime(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString('nl-NL', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function fmtTimeShort(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return String(dateStr);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) {
      return d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('nl-NL', { day: '2-digit', month: '2-digit' }) +
           ' ' + d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  }

  // Drukte-score op basis van totaal km files + aantal files.
  // Drempels zijn afgestemd op typische NL-situatie: >= ~200 km = extreem druk (spitspiek).
  function computeBusyness(fileCount, totalKm) {
    const kmScore = Math.min(totalKm / 200, 1);
    const countScore = Math.min(fileCount / 35, 1);
    return Math.max(kmScore, countScore);
  }

  function busynessLabel(score) {
    if (score < 0.02) return { text: 'Zeer rustig', level: 0 };
    if (score < 0.2)  return { text: 'Rustig',      level: 1 };
    if (score < 0.45) return { text: 'Normaal',     level: 2 };
    if (score < 0.75) return { text: 'Druk',        level: 3 };
    return                   { text: 'Zeer druk',   level: 4 };
  }

  function formatDuration(ms) {
    const totalMin = Math.floor(ms / 60000);
    if (totalMin < 1) return 'minder dan 1 minuut';
    if (totalMin === 1) return '1 minuut';
    if (totalMin < 60) return totalMin + ' minuten';
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (m === 0) return h === 1 ? '1 uur' : h + ' uur';
    return h + 'u ' + m + 'm';
  }

  function renderTimer() {
    if (stateHasFiles === null || stateStart === null) {
      elTimer.style.visibility = 'hidden';
      return;
    }
    elTimer.style.visibility = 'visible';
    const dur = formatDuration(Date.now() - stateStart);
    if (stateHasFiles) {
      elTimer.classList.add('has-files');
      elTimerText.textContent = 'Al ' + dur + ' files';
    } else {
      elTimer.classList.remove('has-files');
      elTimerText.textContent = 'Al ' + dur + ' geen files';
    }
  }

  function updateStateTimer(fileCount) {
    const hasFiles = fileCount > 0;
    if (stateHasFiles !== hasFiles) {
      stateHasFiles = hasFiles;
      stateStart = Date.now();
    }
    renderTimer();
  }

  function updateGauge(fileCount, totalKm) {
    const score = computeBusyness(fileCount, totalKm);
    // Naald ligt rechtop in base-state (wijst naar 50%). -90° = links, +90° = rechts.
    const angle = -90 + score * 180;
    elNeedle.setAttribute('transform', `rotate(${angle.toFixed(1)} 105 105)`);
    const { text, level } = busynessLabel(score);
    elLevel.textContent = text;
    elLevel.className = 'gauge-level level-' + level;
  }

  function splitDirection(directionText) {
    if (!directionText) return { from: '', to: '' };
    // RWS gebruikt "Stad A - Stad B" als richting
    const parts = String(directionText).split(/\s[-–]\s/);
    if (parts.length >= 2) return { from: parts[0].trim(), to: parts.slice(1).join(' - ').trim() };
    return { from: directionText, to: '' };
  }

  function renderEmptyFiles() {
    elFilesList.innerHTML = `
      <div class="empty">
        <div class="check">
          <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg>
        </div>
        <div class="text">Geen files op dit moment</div>
      </div>`;
  }

  function renderEmptyWorks() {
    elWorksList.innerHTML = `
      <div class="empty">
        <div class="text">Geen werkzaamheden gepland</div>
      </div>`;
  }

  function renderError(msg) {
    const html = `<div class="loading">${escapeHtml(msg)}</div>`;
    elFilesList.innerHTML = html;
    elWorksList.innerHTML = html;
  }

  function renderFiles(files) {
    if (!files.length) { renderEmptyFiles(); return; }
    const items = files.slice(0, MAX_ITEMS).map(f => {
      const minutes = Math.round(f.delay || 0);
      const km = ((f.length || 0) / 1000).toFixed(1);
      return `
        <div class="card file">
          <div class="badge">${escapeHtml(f.road || '')}</div>
          <div class="body">
            <div class="route">${escapeHtml(f.from || '')}<span class="arrow">→</span>${escapeHtml(f.to || '')}</div>
            <div class="meta">
              <span class="reason">${escapeHtml(f.reason || 'Onbekende oorzaak')}</span>
              <span class="sep"></span>
              <span>${km} km</span>
            </div>
          </div>
          <div class="right-stat">
            <div class="big">${minutes}</div>
            <div class="unit">min</div>
          </div>
        </div>`;
    }).join('');
    elFilesList.innerHTML = items;
  }

  function renderWorks(works) {
    if (!works.length) { renderEmptyWorks(); return; }
    const items = works.slice(0, MAX_ITEMS).map(w => {
      const start = fmtTimeShort(w.start);
      const stop = fmtTimeShort(w.stop);
      const period = (start || stop) ? `${start} – ${stop}` : '';
      return `
        <div class="card work">
          <div class="badge">${escapeHtml(w.road || '')}</div>
          <div class="body">
            <div class="route">${escapeHtml(w.from || '')}<span class="arrow">→</span>${escapeHtml(w.to || '')}</div>
            <div class="meta">
              <span class="reason">${escapeHtml(w.reason || 'Wegwerkzaamheden')}</span>
            </div>
          </div>
          <div class="right-stat">
            <div class="big">${escapeHtml(period)}</div>
          </div>
        </div>`;
    }).join('');
    elWorksList.innerHTML = items;
  }

  async function fetchOne(url, signal) {
    const res = await fetch(url, {
      cache: 'no-store',
      signal,
      headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  }

  async function fetchViaProxies() {
    // Race alle proxies parallel: de snelste response wint, rest wordt afgebroken.
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
    const target = freshTarget();
    try {
      const attempts = PROXIES.map(makeUrl => fetchOne(makeUrl(target), controller.signal));
      const data = await Promise.any(attempts);
      controller.abort();  // cancel losers
      return data;
    } finally {
      clearTimeout(timeout);
    }
  }

  async function fetchData() {
    try {
      const data = await fetchViaProxies();
      const obstructions = Array.isArray(data.obstructions) ? data.obstructions : [];

      const allFiles = [];
      const allWorks = [];

      obstructions.forEach(o => {
        const { from, to } = splitDirection(o.directionText);
        if (o.obstructionType === TYPE_JAM) {
          allFiles.push({
            road: o.roadNumber || '',
            from, to,
            reason: o.cause || o.title || '',
            delay: o.delay || 0,      // minuten (float)
            length: o.length || 0     // meters
          });
        } else if (o.obstructionType === TYPE_ROADWORK) {
          allWorks.push({
            road: o.roadNumber || '',
            from, to,
            reason: o.title || o.cause || 'Wegwerkzaamheden',
            start: o.timeStart,
            stop: o.timeEnd
          });
        }
      });

      allFiles.sort((a, b) => (b.delay || 0) - (a.delay || 0));

      const totalKm = (typeof data.totalLengthOfJams === 'number')
        ? data.totalLengthOfJams / 1000
        : allFiles.reduce((s, f) => s + (f.length || 0), 0) / 1000;

      elStatFiles.textContent = allFiles.length;
      elStatKm.textContent = totalKm.toFixed(0);
      elStatWorks.textContent = allWorks.length;
      updateGauge(allFiles.length, totalKm);
      updateStateTimer(allFiles.length);
      elFilesCount.textContent = allFiles.length > MAX_ITEMS ? `Top ${MAX_ITEMS} van ${allFiles.length}` : `${allFiles.length}`;
      elWorksCount.textContent = allWorks.length > MAX_ITEMS ? `Top ${MAX_ITEMS} van ${allWorks.length}` : `${allWorks.length}`;
      elUpdate.textContent = fmtTime(new Date().toISOString());

      renderFiles(allFiles);
      renderWorks(allWorks);
    } catch (err) {
      console.error(err);
      renderError('Kan verkeersinformatie niet ophalen');
    }
  }

  fetchData();
  setInterval(fetchData, REFRESH_MS);
  // Timer-tekst elke 30s verversen zodat de "X minuten" ook tussen API-calls door bijwerkt
  setInterval(renderTimer, 30 * 1000);
})();
</script>
</body>
</html>
